aid: grafbase
name: Grafbase
description: Grafbase is an enterprise GraphQL federation platform for building and
  deploying federated GraphQL APIs. It provides a high-performance Rust-powered gateway,
  schema registry, CLI, and a management API for programmatically controlling projects,
  schemas, branches, and deployed graph endpoints. The platform delivers enterprise-grade
  governance, observability, rate limiting, authentication, and AI agent integration
  via Model Context Protocol support.
